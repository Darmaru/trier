name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm
          cache-dependency-path: bundled-node/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Check
        run: ./gradlew check --console=plain

      - name: Verify plugin compatibility
        run: ./gradlew verifyPlugin --console=plain

      - name: Build plugin
        run: ./gradlew buildPlugin --console=plain

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: trier-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin --console=plain
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
